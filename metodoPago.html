<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieVerse - Pago</title>
  <link rel="stylesheet" href="metodoPago.css">
</head>
<body>

<h1>🎬 MOVIEVERSE</h1>

<section class="card">

  <h2>💳 Método de Pago</h2>

  <p><strong>Monto:</strong> $<span id="monto"></span></p>
  <p><strong>Divisa:</strong> 
    <select id="divisa">
      <option value="MXN">MXN</option>
      <option value="USD">USD</option>
      <option value="EUR">EUR</option>
    </select>
  </p>

  <p><strong>Comisión (8%):</strong> $<span id="comision"></span></p>
  <p><strong>Total con comisión:</strong> $<span id="totalFinal"></span></p>

  <p><strong>Plazo:</strong> 24-48 horas</p>
  <p><strong>Estado:</strong> <span id="estado">Pendiente</span></p>

</section>

<section class="card">

  <h2>💳 Datos de la Tarjeta</h2>

  <input type="text" id="tarjeta" placeholder="Número de tarjeta (16 dígitos)" maxlength="16">
  <input type="text" id="fecha" placeholder="MM/AA">
  <input type="text" id="cvv" placeholder="CVV" maxlength="3">

</section>

<section class="card">

  <h2>👤 Datos del Titular</h2>

  <input type="text" id="nombre" placeholder="Nombre completo">
  <input type="text" id="telefono" placeholder="Teléfono">
  <input type="email" id="correo" placeholder="Correo electrónico">

</section>

<section class="acciones">
  <button onclick="procesarPago()">Pagar</button>
  <button onclick="location.reload()">Actualizar</button>
  <button onclick="verTicket()">Ver Ticket 🎟️</button>
</section>

<script src="metodoPago.js"></script>
</body>
</html>
