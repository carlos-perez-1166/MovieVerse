<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieVerse | Registro</title>
  <link rel="stylesheet" href="registro.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<!-- Encabezado responsivo -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="inicio.html">🎬 MovieVerse</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSabor" 
      aria-label="Abrir menú de navegación"> <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSabor">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="inicio.html"> Inicio </a></li>
          <li class="nav-item"><a class="nav-link" href="compra.html"> Compras en línea </a></li>

        </ul>
      </div>
    </div>
  </nav>

<div class="main-content">
  <div class="login-container">
    <h1>🎬 MovieVerse</h1>
    <p>Regístrate para continuar</p>

    <input type="text" id="nombre" placeholder="Nombre completo">
    <input type="email" id="email" placeholder="Correo electrónico">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="btnRegistro" onclick="iniciarSesion('inicio.html')">Registrarse</button>

    <p class="mt-3 text-center">
      ¿Ya tiene cuenta en MovieVerse? 
      <a href="inicioSesion.html" class="text-warning">Iniciar sesión</a>
    </p>

    <p id="mensaje"></p>
  </div>
</div>
